name: Test report

on:
  workflow_run:
    workflows: ['Build']
    types:
      - completed

permissions:
  checks: write
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: dorny/test-reporter@v1
        with:
          artifact: /test-results-(.*)/
          name: Unit tests ($1)
          path: '*.xml'
          reporter: java-junit
