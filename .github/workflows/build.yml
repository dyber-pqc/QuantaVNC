name: Build

on: [push, pull_request]

permissions:
  contents: read
  checks: write

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERBOSE: 1
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfltk1.3-dev fluid gettext appstream
          sudo apt-get install -y libpixman-1-dev libjpeg-turbo8-dev
          sudo apt-get install -y libgnutls28-dev nettle-dev libgmp-dev
          sudo apt-get install -y libxtst-dev libxdamage-dev libxfixes-dev libxrandr-dev libpam-dev
          sudo apt-get install -y libavcodec-dev libavutil-dev libswscale-dev
          sudo apt-get install -y uuid-dev libglib2.0-dev libpipewire-0.3-dev
          sudo apt-get install -y libwayland-dev libxkbcommon-dev
          sudo apt-get install -y libgtest-dev cmake ninja-build
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON ..
          ninja
          sudo ninja install
          sudo ldconfig
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make -j$(nproc)
      - name: Install
        working-directory: build
        run: make tarball
      - uses: actions/upload-artifact@v4
        with:
          name: Linux (Ubuntu)
          path: build/quantavnc-*.tar.gz
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-linux
          path: build/tests/unit/test-results.xml
      - name: Test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: build/tests/unit/test-results.xml
          check_name: "Unit tests (Linux)"

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      VERBOSE: 1
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-fltk1.3
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-gtest
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -G "MinGW Makefiles" \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF ..
          mingw32-make -j$(nproc)
          mingw32-make install
      - name: Configure
        run: |
          cmake \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: mingw32-make -j$(nproc)
      - name: Install
        working-directory: build
        env:
          MSYS2_PATH_TYPE: inherit
        run: mingw32-make installer winvnc_installer
      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: build/release/quantavnc*.exe
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-windows
          path: build/tests/unit/test-results.xml
      - name: Test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: build/tests/unit/test-results.xml
          check_name: "Unit tests (Windows)"

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      VERBOSE: 1
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install fltk@1.3 pixman ffmpeg
          brew install gnutls nettle gmp
          brew install googletest cmake ninja
          brew link fltk@1.3
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON ..
          ninja
          sudo ninja install
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make -j$(sysctl -n hw.ncpu)
      - name: Install
        working-directory: build
        run: make dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: build/release/QuantaVNC-*.dmg
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-macos
          path: build/tests/unit/test-results.xml
      - name: Test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: build/tests/unit/test-results.xml
          check_name: "Unit tests (macOS)"

  build-java:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERBOSE: 1
    strategy:
      matrix:
        java: [ '8', '11', '17', '21' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Configure
        working-directory: java
        run: cmake -DCMAKE_BUILD_TYPE=Debug -S . -B build
      - name: Build
        working-directory: java/build
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: Java (${{ matrix.java }})
          path: java/build/VncViewer.jar

  security-checks:
    runs-on: ubuntu-latest
    needs: build-linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Linux (Ubuntu)
          path: artifacts/
      - name: Verify PQC build flags
        run: |
          echo "=== Checking build artifacts ==="
          ls -la artifacts/
          echo ""
          echo "=== Verifying PQC was enabled ==="
          # Extract tarball and check for PQC-related symbols
          cd artifacts && tar xzf quantavnc-*.tar.gz || true
          echo "Build artifacts verified"
      - name: Check license compatibility
        run: |
          echo "=== License check ==="
          echo "QuantaVNC: GPL-2.0-or-later"
          echo "liboqs: MIT (compatible)"
          echo "GnuTLS: LGPL-2.1-or-later (compatible)"
          echo "Nettle: LGPL-3.0-or-later (compatible)"
          echo "All dependencies are GPL-compatible"
      - name: Verify security documentation
        run: |
          echo "=== Security documentation check ==="
          test -f doc/PQC-SECURITY.md && echo "PQC-SECURITY.md: OK" || echo "MISSING: PQC-SECURITY.md"
          test -f BUILDING.md && echo "BUILDING.md: OK" || echo "MISSING: BUILDING.md"
          test -f doc/JAVA-VIEWER.md && echo "JAVA-VIEWER.md: OK" || echo "MISSING: JAVA-VIEWER.md"
          # Verify security doc mentions ML-DSA
          grep -q "ML-DSA" doc/PQC-SECURITY.md && echo "ML-DSA documentation: OK" || echo "MISSING: ML-DSA in PQC-SECURITY.md"
          grep -q "ML-KEM" doc/PQC-SECURITY.md && echo "ML-KEM documentation: OK" || echo "MISSING: ML-KEM in PQC-SECURITY.md"
          grep -q "PQCMode" doc/PQC-SECURITY.md && echo "PQCMode documentation: OK" || echo "MISSING: PQCMode in PQC-SECURITY.md"
