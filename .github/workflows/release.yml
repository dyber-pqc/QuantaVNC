name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfltk1.3-dev fluid gettext appstream
          sudo apt-get install -y libpixman-1-dev libjpeg-turbo8-dev
          sudo apt-get install -y libgnutls28-dev nettle-dev libgmp-dev
          sudo apt-get install -y libxtst-dev libxdamage-dev libxfixes-dev libxrandr-dev libpam-dev
          sudo apt-get install -y libavcodec-dev libavutil-dev libswscale-dev
          sudo apt-get install -y uuid-dev libglib2.0-dev libpipewire-0.3-dev
          sudo apt-get install -y libwayland-dev libxkbcommon-dev
          sudo apt-get install -y cmake ninja-build
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON ..
          ninja
          sudo ninja install
          sudo ldconfig
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make -j$(nproc)
      - name: Package
        working-directory: build
        run: make tarball
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/quantavnc-*.tar.gz

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-fltk1.3
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-gmp
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -G "MinGW Makefiles" \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_USE_OPENSSL=OFF ..
          mingw32-make -j$(nproc)
          mingw32-make install
      - name: Configure
        run: |
          cmake \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: mingw32-make -j$(nproc)
      - name: Package
        working-directory: build
        env:
          MSYS2_PATH_TYPE: inherit
        run: mingw32-make installer winvnc_installer
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/release/quantavnc*.exe

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install fltk@1.3 pixman ffmpeg
          brew install gnutls nettle gmp
          brew install cmake ninja
          brew link fltk@1.3
      - name: Build and install liboqs
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON ..
          ninja
          sudo ninja install
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_PQC=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make -j$(sysctl -n hw.ncpu)
      - name: Package
        working-directory: build
        run: make dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/release/QuantaVNC-*.dmg

  build-java:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Build
        working-directory: java
        run: cmake -DCMAKE_BUILD_TYPE=Release -S . -B build && make -C build
      - uses: actions/upload-artifact@v4
        with:
          name: java-release
          path: java/build/VncViewer.jar

  publish:
    needs: [build-linux, build-windows, build-macos, build-java]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
          files: |
            artifacts/linux-release/*
            artifacts/windows-release/*
            artifacts/macos-release/*
            artifacts/java-release/*
