<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradient for shield body -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F3C"/>
      <stop offset="50%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#061020"/>
    </linearGradient>
    <!-- Cyan glow gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <!-- Purple accent gradient -->
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B4DCA"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <!-- Outer rim gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="40%" style="stop-color:#7B2FBE"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <!-- Inner glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for lattice inside shield -->
    <clipPath id="shieldClip">
      <path d="M128 22 L224 62 L224 140 C224 190 182 228 128 244 C74 228 32 190 32 140 L32 62 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outer border (cyan-purple gradient rim) -->
  <path d="M128 16 L230 58 L230 142 C230 196 184 236 128 250 C72 236 26 196 26 142 L26 58 Z"
        fill="url(#rimGrad)" opacity="0.9"/>

  <!-- Shield body -->
  <path d="M128 22 L224 62 L224 140 C224 190 182 228 128 244 C74 228 32 190 32 140 L32 62 Z"
        fill="url(#shieldGrad)"/>

  <!-- Inner shield border line -->
  <path d="M128 30 L218 67 L218 140 C218 186 178 222 128 238 C78 222 38 186 38 140 L38 67 Z"
        fill="none" stroke="#00D4FF" stroke-width="0.75" opacity="0.3"/>

  <!-- Quantum lattice grid (clipped to shield) -->
  <g clip-path="url(#shieldClip)" opacity="0.15">
    <!-- Vertical lines -->
    <line x1="68" y1="20" x2="68" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="98" y1="20" x2="98" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="128" y1="20" x2="128" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="158" y1="20" x2="158" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="188" y1="20" x2="188" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <!-- Horizontal lines -->
    <line x1="20" y1="62" x2="240" y2="62" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="20" y1="92" x2="240" y2="92" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="20" y1="122" x2="240" y2="122" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="20" y1="152" x2="240" y2="152" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="20" y1="182" x2="240" y2="182" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="20" y1="212" x2="240" y2="212" stroke="#00D4FF" stroke-width="0.5"/>
    <!-- Diagonal lattice lines -->
    <line x1="38" y1="62" x2="218" y2="212" stroke="#7B2FBE" stroke-width="0.4"/>
    <line x1="218" y1="62" x2="38" y2="212" stroke="#7B2FBE" stroke-width="0.4"/>
    <line x1="68" y1="40" x2="218" y2="182" stroke="#7B2FBE" stroke-width="0.3"/>
    <line x1="188" y1="40" x2="38" y2="182" stroke="#7B2FBE" stroke-width="0.3"/>
  </g>

  <!-- Lattice nodes (quantum dots at intersections, clipped) -->
  <g clip-path="url(#shieldClip)" opacity="0.25">
    <circle cx="68" cy="92" r="2" fill="#00D4FF"/>
    <circle cx="98" cy="92" r="2" fill="#00D4FF"/>
    <circle cx="158" cy="92" r="2" fill="#00D4FF"/>
    <circle cx="188" cy="92" r="2" fill="#00D4FF"/>
    <circle cx="68" cy="122" r="2" fill="#7B2FBE"/>
    <circle cx="98" cy="122" r="2" fill="#00D4FF"/>
    <circle cx="158" cy="122" r="2" fill="#00D4FF"/>
    <circle cx="188" cy="122" r="2" fill="#7B2FBE"/>
    <circle cx="68" cy="152" r="2" fill="#00D4FF"/>
    <circle cx="98" cy="152" r="2" fill="#7B2FBE"/>
    <circle cx="158" cy="152" r="2" fill="#7B2FBE"/>
    <circle cx="188" cy="152" r="2" fill="#00D4FF"/>
    <circle cx="98" cy="182" r="2" fill="#00D4FF"/>
    <circle cx="128" cy="182" r="2" fill="#7B2FBE"/>
    <circle cx="158" cy="182" r="2" fill="#00D4FF"/>
    <circle cx="128" cy="212" r="2" fill="#00D4FF"/>
  </g>

  <!-- Central stylized "Q" -->
  <g filter="url(#softGlow)">
    <!-- Q circle (outer) -->
    <circle cx="128" cy="132" r="42" fill="none" stroke="#00D4FF" stroke-width="3.5" opacity="0.9"/>
    <!-- Q circle (inner glow ring) -->
    <circle cx="128" cy="132" r="38" fill="none" stroke="#00D4FF" stroke-width="0.75" opacity="0.3"/>
    <!-- Q tail - angled slash cutting through bottom-right -->
    <line x1="148" y1="155" x2="175" y2="186" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Q tail accent in purple -->
    <line x1="152" y1="159" x2="173" y2="183" stroke="#7B2FBE" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Quantum orbital rings around the Q -->
  <g opacity="0.5">
    <!-- Elliptical orbit 1 -->
    <ellipse cx="128" cy="132" rx="54" ry="18" fill="none" stroke="#7B2FBE" stroke-width="1"
             transform="rotate(-30 128 132)" opacity="0.5"/>
    <!-- Elliptical orbit 2 -->
    <ellipse cx="128" cy="132" rx="54" ry="18" fill="none" stroke="#7B2FBE" stroke-width="1"
             transform="rotate(30 128 132)" opacity="0.5"/>
  </g>

  <!-- Electron dots on orbits -->
  <g filter="url(#glow)">
    <circle cx="94" cy="108" r="3" fill="#00D4FF" opacity="0.9"/>
    <circle cx="162" cy="156" r="3" fill="#00D4FF" opacity="0.9"/>
    <circle cx="160" cy="108" r="2.5" fill="#7B2FBE" opacity="0.8"/>
    <circle cx="96" cy="156" r="2.5" fill="#7B2FBE" opacity="0.8"/>
  </g>

  <!-- Small keyhole accent at top of shield (security symbol) -->
  <g opacity="0.6">
    <circle cx="128" cy="52" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <rect x="126" y="56" width="4" height="8" rx="1" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Subtle top highlight on shield -->
  <path d="M128 22 L224 62 L224 80 C180 72 76 72 32 80 L32 62 Z"
        fill="#FFFFFF" opacity="0.04"/>
</svg>